services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4040:4040"
    volumes:
      # ~/.claude mounted for CLI session persistence + config
      - "${HOME}/.claude:/root/.claude"
      # ~/.claude.json config file (required by CLI)
      # .claude.json is copied into the container at startup (not bind-mounted)
      # because the CLI needs it writable and bind-mounts risk corruption
      - "${CLAUDE_JSON_SNAPSHOT:-${HOME}/.claude.json}:/tmp/claude-config.json:ro"
      # Managed projects — same absolute path inside and outside container
      # so path strings in the UI match what's on disk
      - "${MANAGED_PROJECTS_DIR:-${HOME}/git/claude-managed-projects}:${MANAGED_PROJECTS_DIR:-${HOME}/git/claude-managed-projects}"
      # claude-manager source — so the symlink in managed-projects resolves
      - "${HOME}/git/claude-manager:${HOME}/git/claude-manager"
      # Infrastructure repos — so symlinks in managed-projects resolve
      - "${HOME}/git/kind-infra:${HOME}/git/kind-infra"
      - "${HOME}/git/helm-platform:${HOME}/git/helm-platform"
      # Frontend dev mount — live reload without rebuilding image
      - "./frontend:/app/frontend:ro"
      # SSH keys + git config for git push/pull inside agents
      - "${HOME}/.ssh:/root/.ssh:ro"
      - "${HOME}/.gitconfig:/root/.gitconfig:ro"
      # OAuth token file — refreshed on host by launchd, read per-spawn by backend
      - "./.claude-snapshot/oauth-token:/run/claude-oauth-token:ro"
    environment:
      CLAUDE_DATA_DIR: /root/.claude
      MANAGED_PROJECTS_DIR: "${MANAGED_PROJECTS_DIR:-${HOME}/git/claude-managed-projects}"
      DATABASE_URL: "${DATABASE_URL:-}"
      # OAuth token for Pro subscription auth (extracted from macOS Keychain)
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
      # GitHub PAT for gh CLI and git HTTPS operations inside agents
      GH_TOKEN: "${GH_TOKEN:-}"
      GITHUB_TOKEN: "${GH_TOKEN:-}"
    restart: unless-stopped

  mcp-canvas:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python3 -m backend.mcp.canvas_server
    ports:
      - "4041:4041"
    environment:
      CANVAS_API_URL: "http://backend:4040"
    depends_on:
      - backend
    restart: unless-stopped

  mcp-orchestrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python3 -m backend.mcp.orchestrator_server
    ports:
      - "4042:4042"
    environment:
      MANAGER_API_URL: "http://backend:4040"
    depends_on:
      - backend
    restart: unless-stopped
