# ─────────────────────────────────────────────────────────────────────────────
# claude-manager Helm values — dev cluster (claude-manager-dev)
#
# Deploy with:
#   helm upgrade --install claude-manager ./infrastructure/helm/claude-manager \
#     --namespace claude-manager \
#     --context kind-claude-manager-dev \
#     --values ./infrastructure/helm/values-dev.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Global ────────────────────────────────────────────────────────────────────
global:
  imageRegistry: "registry.registry.svc.cluster.local:5000"

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  enabled: true

  image:
    repository: claude-manager/backend
    tag: latest
    pullPolicy: Always

  replicas: 1

  # Host filesystem paths — these must match the kind cluster.yaml extraMounts.
  # Using absolute paths because the kind node mounts are at these exact paths.
  hostHome: /Users/ayx106492
  repoDir: /Users/ayx106492/git
  managedProjectsDir: /Users/ayx106492/git/claude-managed-projects

  # Pin to the worker node (which has the hostPath mounts)
  nodeSelector:
    kubernetes.io/hostname: claude-manager-dev-worker

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "4000m"

  # MCP sidecars
  mcp:
    canvas:
      enabled: true
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    orchestrator:
      enabled: true
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "500m"

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: claude-manager/frontend
    tag: latest
    pullPolicy: Always

  replicas: 1

  ingress:
    enabled: true
    className: nginx
    host: claude-manager-dev.localhost

  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"
