# ─────────────────────────────────────────────────────────────────────────────
# claude-manager Helm values
#
# Deploy with:
#   helm upgrade --install claude-manager ./infrastructure/helm/claude-manager \
#     --namespace claude-manager --create-namespace \
#     --values ./infrastructure/helm/claude-manager/values.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Global ────────────────────────────────────────────────────────────────────
global:
  # Registry prefix prepended to every image reference.
  # Empty → no prefix (local dev). Jenkins CI sets this to the in-cluster addr.
  imageRegistry: ""

# Backend runs natively on the host (not in k8s).
# Start with: ./run.sh
# nginx proxies /api/ and /ws → host.docker.internal:4040

# ── Frontend (nginx) ──────────────────────────────────────────────────────────
frontend:
  image:
    repository: claude-manager/frontend
    tag: latest
    pullPolicy: IfNotPresent

  replicas: 1

  ingress:
    enabled: true
    className: nginx
    host: claude-manager.localhost

  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"
