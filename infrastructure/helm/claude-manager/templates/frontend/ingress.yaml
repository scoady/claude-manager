{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claude-manager-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    # Extended timeouts for WebSocket connections (agent streaming)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    {{- if .Values.backend.enabled }}
    # WebSocket upgrade support for /ws path
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    {{- end }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  rules:
    {{- if .Values.frontend.ingress.host }}
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:
          {{- if .Values.backend.enabled }}
          # Backend API routes — must come before the catch-all frontend route
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4040
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4040
          {{- end }}
          # Frontend catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    {{- else }}
    - http:
        paths:
          {{- if .Values.backend.enabled }}
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4040
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4040
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    {{- end }}
{{- end }}
