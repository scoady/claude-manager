apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-manager.labels" . | nindent 4 }}
    app: backend
    app.kubernetes.io/component: backend
spec:
  selector:
    app: backend
  ports:
    - port: 4040
      targetPort: 4040
      name: http
  type: ClusterIP
