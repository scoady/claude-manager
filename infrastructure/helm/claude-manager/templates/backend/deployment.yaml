{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-manager.labels" . | nindent 4 }}
    app: backend
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas | default 1 }}
  strategy:
    type: Recreate  # Single replica, stateful — no rolling update
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: claude-manager-backend
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # ── Main backend (FastAPI) ───────────────────────────────────────
        - name: backend
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4040
          env:
            - name: CLAUDE_DATA_DIR
              value: /root/.claude
            - name: MANAGED_PROJECTS_DIR
              value: "{{ .Values.backend.managedProjectsDir }}"
            # OAuth token — read from the hostPath-mounted file at startup
            # The launchd plist on the host refreshes this every 30 min
            - name: OAUTH_TOKEN_FILE
              value: /root/.claude/oauth-token
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-backend-secrets
                  key: gh-token
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-backend-secrets
                  key: gh-token
                  optional: true
            # Kubeconfig for in-cluster access (generated by entrypoint or SA)
            - name: KUBECONFIG
              value: /root/.kube/config
          volumeMounts:
            - name: claude-data
              mountPath: /root/.claude
            - name: claude-json
              mountPath: /tmp/claude-config.json
              readOnly: true
            - name: claude-versions
              mountPath: "{{ .Values.backend.hostHome }}/.local/share/claude/versions"
              readOnly: true
            - name: managed-projects
              mountPath: "{{ .Values.backend.managedProjectsDir }}"
            - name: claude-manager-src
              mountPath: "{{ .Values.backend.repoDir }}/claude-manager"
              readOnly: true
            - name: kind-infra-src
              mountPath: "{{ .Values.backend.repoDir }}/kind-infra"
              readOnly: true
            - name: helm-platform-src
              mountPath: "{{ .Values.backend.repoDir }}/helm-platform"
              readOnly: true
            - name: ssh-keys
              mountPath: /root/.ssh
              readOnly: true
            - name: gitconfig
              mountPath: /root/.gitconfig
              readOnly: true
            - name: docker-socket
              mountPath: /var/run/docker.sock
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4040
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4040
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

        {{- if .Values.backend.mcp.canvas.enabled }}
        # ── MCP Canvas sidecar ─────────────────────────────────────────────
        - name: mcp-canvas
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["python3", "-m", "backend.mcp.canvas_server"]
          ports:
            - name: mcp-canvas
              containerPort: 4041
          env:
            - name: CANVAS_API_URL
              value: "http://localhost:4040"
          resources:
            {{- toYaml .Values.backend.mcp.canvas.resources | nindent 12 }}
        {{- end }}

        {{- if .Values.backend.mcp.orchestrator.enabled }}
        # ── MCP Orchestrator sidecar ───────────────────────────────────────
        - name: mcp-orchestrator
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["python3", "-m", "backend.mcp.orchestrator_server"]
          ports:
            - name: mcp-orch
              containerPort: 4042
          env:
            - name: MANAGER_API_URL
              value: "http://localhost:4040"
          resources:
            {{- toYaml .Values.backend.mcp.orchestrator.resources | nindent 12 }}
        {{- end }}

      volumes:
        - name: claude-data
          hostPath:
            path: "{{ .Values.backend.hostHome }}/.claude"
            type: Directory
        - name: claude-json
          hostPath:
            path: "{{ .Values.backend.hostHome }}/.claude.json"
            type: File
        - name: claude-versions
          hostPath:
            path: "{{ .Values.backend.hostHome }}/.local/share/claude/versions"
            type: Directory
        - name: managed-projects
          hostPath:
            path: "{{ .Values.backend.managedProjectsDir }}"
            type: Directory
        - name: claude-manager-src
          hostPath:
            path: "{{ .Values.backend.repoDir }}/claude-manager"
            type: Directory
        - name: kind-infra-src
          hostPath:
            path: "{{ .Values.backend.repoDir }}/kind-infra"
            type: Directory
        - name: helm-platform-src
          hostPath:
            path: "{{ .Values.backend.repoDir }}/helm-platform"
            type: Directory
        - name: ssh-keys
          hostPath:
            path: "{{ .Values.backend.hostHome }}/.ssh"
            type: Directory
        - name: gitconfig
          hostPath:
            path: "{{ .Values.backend.hostHome }}/.gitconfig"
            type: File
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
{{- end }}
