server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backend API proxy.
    # In k8s: the ingress routes /api/ and /ws directly to the backend service,
    # so these blocks are never hit. They exist as a fallback for direct access.
    # In docker-compose: the BACKEND_URL env var can override (default: host.docker.internal).
    location /api/ {
        proxy_pass         http://host.docker.internal:4040;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header         Cache-Control     "no-store";
    }

    # WebSocket upgrade for real-time agent events.
    location /ws {
        proxy_pass             http://host.docker.internal:4040;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # SPA fallback — serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
