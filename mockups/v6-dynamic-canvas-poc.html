<style>
  :root {
    --bg-void: #030509;
    --bg-base: #080c14;
    --bg-surface: #0e1525;
    --bg-elevated: #141d30;
    --bg-hover: #1a2640;
    --bg-border: #243352;
    --bg-border-dim: #1a2640;
    --accent-green: #4ade80;
    --accent-amber: #fbbf24;
    --accent-red: #f87171;
    --accent-purple: #a78bfa;
    --accent-cyan: #67e8f9;
    --accent-magenta: #c084fc;
    --accent-teal: #5eead4;
    --accent-pink: #f9a8d4;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-ui: 'DM Sans', sans-serif;
    --font-title: 'Plus Jakarta Sans', sans-serif;
    --font-display: 'Instrument Serif', Georgia, serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --canvas-transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg-void); color: var(--text-primary); font-family: var(--font-ui); font-size: 13px; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-border); border-radius: 2px; }

  #app { display: grid; grid-template-rows: 44px 1fr; grid-template-columns: 180px 1fr; height: 100vh; }

  /* Header */
  .header {
    grid-column: 1 / -1;
    background: rgba(8,12,20,0.9); backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(36,51,82,0.4);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; z-index: 200;
  }
  .hl { display: flex; align-items: center; gap: 8px; }
  .logo { width: 24px; height: 24px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }
  .brand { font-family: var(--font-title); font-size: 13px; font-weight: 700; }
  .brand-sub { font-family: var(--font-mono); font-size: 7px; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.5; }
  .hc { display: flex; gap: 14px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

  .hr { display: flex; align-items: center; gap: 6px; }
  .hbtn { padding: 4px 10px; border: 1px solid transparent; border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); font-family: var(--font-ui); font-size: 11px; cursor: pointer; }
  .hbtn.on { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--bg-border); }
  .cdot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); margin-left: 8px; }

  /* Sidebar */
  .sidebar { background: rgba(14,21,37,0.5); border-right: 1px solid rgba(36,51,82,0.2); overflow-y: auto; padding: 8px 0; z-index: 100; }
  .sl { font-family: var(--font-mono); font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding: 8px 12px 4px; }
  .si { display: flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 11px; color: var(--text-secondary); cursor: pointer; }
  .si:hover { background: rgba(26,38,64,0.3); }

  .sd { width: 4px; height: 4px; border-radius: 50%; }
  .sd.w { background: var(--accent-amber); box-shadow: 0 0 4px var(--accent-amber); animation: pulse 2s ease-in-out infinite; }
  .sd.i { background: var(--accent-green); }
  .sd.o { background: var(--text-muted); opacity: 0.3; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* === CANVAS === */
  .canvas {
    position: relative; overflow: hidden;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(74,222,128,0.015) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 50%, rgba(251,191,36,0.01) 0%, transparent 40%),
      radial-gradient(ellipse at 80% 70%, rgba(103,232,249,0.01) 0%, transparent 45%),
      var(--bg-void);
  }

  /* Canvas widget — the core abstraction */
  .canvas-widget {
    position: absolute;
    transition:
      left var(--canvas-transition),
      top var(--canvas-transition),
      width var(--canvas-transition),
      height var(--canvas-transition),
      opacity var(--canvas-transition),
      transform var(--canvas-transition),
      border-color 0.3s,
      box-shadow 0.3s;
  }
  .canvas-widget.entering {
    animation: widgetEnter 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .canvas-widget.exiting {
    animation: widgetExit 0.4s cubic-bezier(0.55, 0, 1, 0.45) both;
  }
  @keyframes widgetEnter {
    from { opacity: 0; transform: scale(0.85) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes widgetExit {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.9); }
  }

  /* Widget drag handle */
  .canvas-widget.dragging { z-index: 1000 !important; transition: none !important; cursor: grabbing; }

  /* === WIDGET TYPES === */

  /* Constellation widget */
  .w-constellation {
    border-radius: var(--radius-md);
    overflow: hidden;
    background: rgba(4,6,11,0.4);
    border: 1px solid rgba(36,51,82,0.2);
  }
  .w-constellation .inner { position: relative; width: 100%; height: 100%; }
  .w-constellation svg.lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .w-constellation svg.lines line { stroke-width: 0.5; opacity: 0.25; }
  .w-constellation .star {
    position: absolute; border-radius: 50%; transform: translate(-50%, -50%);
    cursor: pointer; z-index: 2; padding: 7px; margin: -7px; background: transparent;
  }
  .w-constellation .star::after { content: ''; display: block; border-radius: 50%; transition: transform 0.2s, filter 0.2s; }
  .w-constellation .star.done::after { width: 4px; height: 4px; background: var(--accent-green); box-shadow: 0 0 3px rgba(74,222,128,0.5); }
  .w-constellation .star.active::after { width: 7px; height: 7px; background: var(--accent-amber); box-shadow: 0 0 6px rgba(251,191,36,0.6), 0 0 14px rgba(251,191,36,0.2); animation: starGlow 2s ease-in-out infinite; }
  .w-constellation .star.queued::after { width: 2px; height: 2px; background: var(--text-muted); opacity: 0.25; }
  @keyframes starGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .w-constellation .star:hover::after { transform: scale(2.2); filter: brightness(1.5); }
  .w-constellation .star .rp { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; pointer-events: none; }
  .w-constellation .star.active .rp:nth-child(1) { width: 16px; height: 16px; border: 1px solid rgba(251,191,36,0.35); animation: rp 2.5s ease-out infinite; }

  .w-constellation .star-tip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);

  /* Active work widget */
  .w-work {

// ═══════════════════════════════════════════════════════════
// CANVAS ENGINE — This is the actual production-grade engine
// ═══════════════════════════════════════════════════════════

class CanvasEngine {
  constructor(containerEl) {
    this.container = containerEl;
    this.widgets = new Map(); // id → { spec, element }
    this.renderers = {};
  }

  registerRenderer(type, renderFn) {
    this.renderers[type] = renderFn;
  }

  // === MCP-equivalent API ===

  create(spec) {
    if (this.widgets.has(spec.id)) this.remove(spec.id);

    const el = document.createElement('div');
    el.className = 'canvas-widget entering';
    el.dataset.widgetId = spec.id;
    this._applyPosition(el, spec);

    // Render inner content
    const renderer = this.renderers[spec.type];
    if (renderer) {
      el.innerHTML = '';
      const inner = renderer(spec.props || {});
      if (typeof inner === 'string') el.innerHTML = inner;
      else if (inner instanceof HTMLElement) el.appendChild(inner);
    }

    this.container.appendChild(el);
    this.widgets.set(spec.id, { spec, element: el });

    // Remove entering class after animation
    setTimeout(() => el.classList.remove('entering'), 500);
    return el;
  }

  update(id, changes) {
    const w = this.widgets.get(id);
    if (!w) return;

    Object.assign(w.spec, changes);
    this._applyPosition(w.element, w.spec);

    // Re-render content if props changed
    if (changes.props) {
      const renderer = this.renderers[w.spec.type];
      if (renderer) {
        const inner = renderer(w.spec.props);
        if (typeof inner === 'string') w.element.innerHTML = inner;
      }
    }
  }

  remove(id) {
    const w = this.widgets.get(id);
    if (!w) return;
    w.element.classList.add('exiting');
    setTimeout(() => {
      w.element.remove();
      this.widgets.delete(id);
    }, 400);
  }

  animate(id, animation) {
    const w = this.widgets.get(id);
    if (!w) return;
    const cls = 'anim-' + animation;
    w.element.classList.remove(cls);
    void w.element.offsetWidth;
    w.element.classList.add(cls);
    setTimeout(() => w.element.classList.remove(cls), 1000);
  }

  layout(specs) {
    // Bulk layout: smoothly move all widgets to new positions
    specs.forEach(s => {
      if (this.widgets.has(s.id)) {
        this.update(s.id, s);
      } else {
        this.create(s);
      }
    });

    // Remove widgets not in new layout
    const newIds = new Set(specs.map(s => s.id));
    for (const [id] of this.widgets) {
      if (!newIds.has(id)) this.remove(id);
    }
  }

  _applyPosition(el, spec) {
    el.style.left = (spec.x || 0) + '%';
    el.style.top = (spec.y || 0) + '%';
    el.style.width = (spec.w || 20) + '%';
    el.style.height = (spec.h || 20) + '%';
    if (spec.zIndex) el.style.zIndex = spec.zIndex;
    if (spec.opacity !== undefined) el.style.opacity = spec.opacity;
  }
}

];

let seed = 42;
function rand() { seed = (seed * 16807) % 2147483647; return seed / 2147483647; }
function resetSeed() { seed = 42; }

function renderConstellation(props) {
  resetSeed();
  const div = document.createElement('div');
  div.className = 'w-constellation';
  div.style.cssText = 'width:100%;height:100%';
  const inner = document.createElement('div');
  inner.className = 'inner';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'lines');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
  const nodes = [];

  TASKS.forEach(task => {
    let x, y;
    if (task.status === 'done') { x = 4 + rand() * 28; y = 8 + rand() * 84; }
    else if (task.status === 'active') { x = 35 + rand() * 22; y = 15 + rand() * 70; }
    else { x = 58 + rand() * 38; y = 6 + rand() * 88; }
    nodes.push({ x, y, task });

    const star = document.createElement('div');
    star.className = `star ${task.status}`;
    star.style.left = x + '%';
    star.style.top = y + '%';
    if (task.status === 'active') star.innerHTML = '<span class="rp"></span><span class="rp"></span>';
    const tip = document.createElement('div');
    tip.className = 'star-tip';
    const icon = task.status === 'done' ? '&#10003;' : task.status === 'active' ? '&#9679;' : '&#9675;';
    tip.innerHTML = `<span class="ts ${task.status}">${icon}</span> ${task.text}`;
    star.appendChild(tip);
    inner.appendChild(star);
  });

  const svgNS = 'http://www.w3.org/2000/svg';
  for (let i = 0; i < nodes.length; i++) {
    let c = 0;
    for (let j = i + 1; j < nodes.length && c < 2; j++) {
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      if (Math.sqrt(dx*dx + dy*dy) < 14 && rand() > 0.3) {
        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', nodes[i].x+'%'); line.setAttribute('y1', nodes[i].y+'%');
        line.setAttribute('x2', nodes[j].x+'%'); line.setAttribute('y2', nodes[j].y+'%');
        const s = nodes[i].task.status;
        line.style.stroke = s === 'done' ? 'rgba(74,222,128,0.25)' : s === 'active' ? 'rgba(251,191,36,0.3)' : 'rgba(71,85,105,0.15)';
        svg.appendChild(line);
        c++;
      }
    }
  }

  inner.appendChild(svg);
  div.appendChild(inner);
  return div;
}

function renderProgress(props) {
  const r = 24, c = 2 * Math.PI * r;
  const doneOff = c - (c * 0.26);
  const actOff = c - (c * 0.32);
  return `<div class="w-progress">
    <div style="width:52px;height:52px;position:relative">
      <svg viewBox="0 0 52 52" style="width:100%;height:100%;transform:rotate(-90deg)">
        <circle class="pr-bg" cx="26" cy="26" r="${r}"/>
        <circle class="pr-done" cx="26" cy="26" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${doneOff}"/>
        <circle class="pr-active" cx="26" cy="26" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${actOff}"/>
      </svg>
      <div class="pr-center" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span class="pr-pct">26%</span>
        <span class="pr-lbl">complete</span>
      </div>
    </div>
    <div class="pr-stats">
      <span class="pr-stat"><span class="pr-dot d"></span><span class="pr-v">12</span><span class="pr-l"> done</span></span>
      <span class="pr-stat"><span class="pr-dot a"></span><span class="pr-v">3</span><span class="pr-l"> active</span></span>
      <span class="pr-stat"><span class="pr-dot q"></span><span class="pr-v">10</span><span class="pr-l"> queued</span></span>
    </div>
  </div>`;
}

function renderAgent(props) {
  const { task, color, badge, stream } = props;
  return `<div class="w-agent">
    <div class="wa-head">
      <div class="wa-lane glow" style="background:${color};--lc:${color}"></div>
      <div class="wa-task">${task}</div>
      <span class="wa-badge">${badge}</span>
    </div>
    <div class="wa-body">
      <div class="wa-stream">${stream}<span class="cur"></span></div>
    </div>
  </div>`;
}

function renderMetric(props) {
  const { value, label, color, trend } = props;
  return `<div class="w-metric">
    <div class="wm-value" style="color:${color || 'var(--text-primary)'}">${value}</div>
    <div class="wm-label">${label}</div>
    ${trend ? `<div class="wm-trend" style="color:${trend.startsWith('+') ? 'var(--accent-green)' : 'var(--text-muted)'}">${trend}</div>` : ''}
  </div>`;
}

function renderText(props) {
  const { content, font, size, weight, color, align, letterSpacing } = props;
  return `<div class="w-text" style="
    font-family:var(--font-${font || 'mono'});
    font-size:${size || 12}px;
    font-weight:${weight || 400};
    color:${color || 'var(--text-muted)'};
    text-align:${align || 'left'};
    letter-spacing:${letterSpacing || '0'}em;
    text-transform:${size < 10 ? 'uppercase' : 'none'};
    opacity:${size < 10 ? 0.15 : 1};
    pointer-events:none;
  ">${content}</div>`;
}

function renderParticles(props) {
  const { density = 40, color = 'white' } = props;
  const particles = [];
  for (let i = 0; i < density; i++) {
    const size = 0.3 + Math.random() * 1.2;
    particles.push(`<div class="particle" style="width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${0.03+Math.random()*0.1};background:${color}"></div>`);
  }
  return `<div class="w-particles" style="position:relative;width:100%;height:100%">${particles.join('')}</div>`;
}

function renderWork(props) {
  const pills = [
    { color: '#67e8f9', text: 'Unit tests (auth, cart)' },
    { color: '#c084fc', text: 'Component tests (RTL)' },
    { color: '#4ade80', text: 'E2E Playwright' },
  ];
  return `<div class="w-work">
    <div class="ww-title">Active Work</div>
    ${pills.map(p => `<div class="ww-pill"><span class="ww-dot" style="background:${p.color}"></span>${p.text}</div>`).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// INIT ENGINE + REGISTER RENDERERS
// ═══════════════════════════════════════════════════════════

const canvas = new CanvasEngine(document.getElementById('canvas'));
canvas.registerRenderer('constellation', renderConstellation);
canvas.registerRenderer('progress', renderProgress);
canvas.registerRenderer('agent', renderAgent);
canvas.registerRenderer('metric', renderMetric);
canvas.registerRenderer('text', renderText);
canvas.registerRenderer('particles', renderParticles);
canvas.registerRenderer('work', renderWork);

let currentLayout = null;

function log(msg) {
  document.getElementById('demoLog').textContent = msg;
}

function runLayout(name) {
  const layout = LAYOUTS[name];
  if (!layout) return;

  // Highlight active button
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  log(`canvas.layout(${layout.length} widgets) — "${name}" layout`);
  canvas.layout(layout);
  currentLayout = name;
}

function animateAll(type) {
  log(`canvas.animate(*, "${type}")`);
  for (const [id] of canvas.widgets) {
    canvas.animate(id, type);
  }
}
